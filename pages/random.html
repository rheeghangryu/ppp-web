<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>
    (function(d) {
      var config = {
        kitId: 'gzd1lqq',
        scriptTimeout: 3000,
        async: true
      },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;
        if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);
        try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
  </script>

  <title>Pick Random</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/random.css" />
</head>
<body>
  <header class="title">
    <h1>PPP</h1>
    <div class="speech-bubble hidden" id="speechBubble">
      <span class="speech-text" id="speechText">Hello Punny Poster Pals!</span>
    </div>
  </header>

  <button class="main-nav-toggle" id="mainNavToggle" aria-label="메뉴 열기">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <header class="main-nav" id="mainNav">
    <a class="main-nav__link" href="about.html">ABOUT</a>
    <a class="main-nav__link" href="archive.html">ARCHIVE</a>
    <a class="main-nav__link" aria-current="page">PICK RANDOM</a>
  </header>

  <div class="people">
    <a class="main-nav__link" href="https://www.instagram.com/nanun.dandan/" target="_blank" rel="noopener noreferrer">DANDAN 단단</a>
    <a class="main-nav__link" href="https://www.instagram.com/rheeghang8.0/" target="_blank" rel="noopener noreferrer">RHEEGHANG 리강</a>
  </div>


  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
    <div class="loading-logo" role="status" aria-label="Loading">
    <span>P</span><span>P</span><span>P</span>
  </div>
  </div>

  <!-- quarter list panels (1/4 and 3/4 of viewport width) -->
  <aside class="quarter-panel quarter-panel--left" aria-label="Left list panel">
    <div class="quarter-panel__inner">
      <div class="quarter-panel__title" id="panel-title-left"></div>
      <ol class="quarter-panel__list" id="list-left" aria-label="Left list"></ol>
    </div>
  </aside>

  <aside class="quarter-panel quarter-panel--right" aria-label="Right list panel">
    <div class="quarter-panel__inner">
      <div class="quarter-panel__title" id="panel-title-right"></div>
      <ul class="quarter-panel__list" id="list-right" aria-label="Right list"></ul>
    </div>
  </aside>

  <div class="subject">
    <p id="subject-data"></p>
    <p class="subject-title">Subject</p>
  </div>
  <div class="rule">
    <p class="rule-title">Rule</p>
    <p id="rule-data"></p>
  </div>

  <div class="mode-toggle" id="modeToggle" data-mode="none" aria-label="모드 선택">
    <div class="mode-toggle__hint" id="modeHint">모드를 선택해 주세요!<br>
      Choose the mode!</div>
    <div class="mode-title">MODE</div>
    <div class="mode-toggle__track" role="group" aria-label="Mode">
      <button class="mode-toggle__option" type="button" data-mode="D" aria-pressed="false">D</button>
      <button class="mode-toggle__option" type="button" data-mode="R" aria-pressed="false">R</button>
    </div>
  </div>

  <button class="pick-random" id="pickRandom" aria-label="랜덤 주제 선택">
    <span>PICK RANDOM</span>
  </button>
  <!-- <div class="coming-soon" id="comingSoon">
    <p>준비중입니다...coming soon....</p>
  </div> -->

  <script src="../js/app.js" defer></script>
  <script src="../js/random.js" defer></script>
</body>
</html>
